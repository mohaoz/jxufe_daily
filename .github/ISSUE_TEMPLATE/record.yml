name: 提交做题记录
description: 提交训练记录和评测记录，可选择是否公开展示为题解
title: "[做题记录] [题目ID]"
labels:
  - record
body:
  - type: input
    id: problem
    attributes:
      label: 题目 ID
      description: 例如 at-abc233d
      placeholder: at-abc233d
    validations:
      required: true
  - type: input
    id: user
    attributes:
      label: 用户 ID
      description: 将用于生成 data/problems/<题目>/submissions/<用户>.md
      placeholder: mohao
    validations:
      required: true
  - type: input
    id: record
    attributes:
      label: 评测记录
      description: AtCoder、洛谷、Codeforces 等评测记录链接
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: solution
    attributes:
      label: 是否愿意公开展示为题解
      description: 选择 true 后，提交内容会作为题解候选展示。
      options:
        - "false"
        - "true"
      default: 0
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: 可展示内容
      description: 可选。若上面选择 true，请填写题解、提示或代码；支持 Markdown。
      value: |
        **Solution**

        **Code**

        ```cpp

        ```
