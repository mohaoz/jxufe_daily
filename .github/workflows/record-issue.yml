name: Submit record from issue

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

jobs:
  submit-record:
    if: contains(github.event.issue.labels.*.name, 'record')
    runs-on: ubuntu-latest
    steps:
      - name: Write submission file
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function readSection(title) {
              const escapedTitle = title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const pattern = new RegExp(`(?:^|\\n)###\\s+${escapedTitle}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`);
              const match = issue.body.match(pattern);
              if (!match) return '';
              return match[1]
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/^_No response_$/m, '')
                .trim();
            }

            function assertIdentifier(value, label) {
              if (!/^[A-Za-z0-9][A-Za-z0-9._-]*$/.test(value)) {
                throw new Error(`${label} 格式不合法：${value}`);
              }
            }

            function yamlString(value) {
              return value ? JSON.stringify(value) : 'null';
            }

            const problem = readSection('题目 ID');
            const user = readSection('用户 ID');
            const record = readSection('评测记录');
            const solutionRaw = readSection('是否愿意公开展示为题解').toLowerCase();
            const content = readSection('可展示内容');
            const displayAsSolution = ['true', 'yes', '是'].includes(solutionRaw);

            assertIdentifier(problem, '题目 ID');
            assertIdentifier(user, '用户 ID');

            const { data: repository } = await github.rest.repos.get({ owner, repo });
            const branch = repository.default_branch;

            try {
              await github.rest.repos.getContent({
                owner,
                repo,
                path: `data/problems/${problem}/problem.md`,
                ref: branch
              });
            } catch (error) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `提交失败：找不到题目 \`${problem}\`。`
              });
              throw error;
            }

            const path = `data/problems/${problem}/submissions/${user}.md`;
            const body = [
              '---',
              `record: ${yamlString(record)}`,
              `solution: ${displayAsSolution}`,
              '---',
              '',
              content
            ].join('\n').trimEnd() + '\n';

            let sha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner,
                repo,
                path,
                ref: branch
              });
              if (!Array.isArray(data)) sha = data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              sha,
              message: `record: ${problem} ${user}`,
              content: Buffer.from(body, 'utf8').toString('base64')
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: `已写入 \`${path}\`。`
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issue.number,
              state: 'closed'
            });
